version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nestora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nestora
      POSTGRES_PASSWORD: nestora123
      POSTGRES_DB: nestora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nestora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: nestora-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: nestora
      MINIO_ROOT_PASSWORD: nestora12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
